name: CI/CD NocSphere

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build & Push Backend Image (Target: backend-runner)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: backend-runner
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nocsphere-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build & Push Frontend Image (Target: frontend-runner)
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: frontend-runner
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nocsphere-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
